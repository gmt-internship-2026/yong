# gesture_kiosk 맥(개발 PC) 전용 설정 — config.yaml과 같은 구조, 맥 환경 차이만 다르다
# 사용: python scripts/run_demo.py --config configs/config_mac.yaml
# 원본과 다른 점 (docs/MAC_RUN_LOG.md 참고):
#   demo_ui.port: 5000 → 5001   (맥 AirPlay 수신기(ControlCenter)가 5000 선점)
#   announce.backend: tts       (pyttsx3가 맥 nsss로 동작 — 미설치면 자동 log 폴백)

camera:
  device_id: 0            # 맥 내장(MacBook Pro) 카메라
  width_px: 1280
  height_px: 720
  mirror: true
  windows_backend: auto   # 맥에서는 무시된다
  fourcc: mjpg            # 캡처 픽셀 포맷 — 맥 내장 카메라는 무시될 수 있다 (무해)

model:
  # 라이선스(2026-07-15 2차): rtmlib RTMPose(Apache-2.0) 포즈 단일 모델. 맥은 CPU 실행(개발 확인용)
  device: auto            # 맥: CUDA 없음 -> 자동으로 cpu
  use_tensorrt: false
  pose_mode: lightweight  # ★ 맥 CPU — 가벼운 포즈 모델로 개발 확인
  input_size_px: 640
  max_infer_fps: 30       # 배포와 동일 30 고정(2026-07-16) — 60이면 추론 루프가 캡처
                          #   스레드의 CPU/GIL을 빼앗아 캡처 FPS가 반토막 → 인식 저하

person_lock:
  enabled: true
  kpt_conf_threshold: 0.3
  lock_frame_count: 3
  follow_radius_ratio: 0.25
  release_sec: 2.0
  sharpness_weight: 0.5

gestures:
  cooldown_sec: 1.0       # swipe.window_sec보다 길게 (config.yaml 주석 참고)
  swipe:                    # 임계 단위 = 어깨너비 배수(카메라 거리 무관) — config.yaml 주석 참고
    window_sec: 0.8
    min_dist_x_shoulder: 0.8
    min_dist_y_shoulder: 0.5
    axis_dominance: 1.5
    min_track_frames: 4
    elbow_gain: 2.0         # 손목 미검출 시 팔꿈치 폴백 배율 — config.yaml 주석 참고
    rearm_still_shoulder: 0.02  # 정지 재장전(복귀 스트로크 오탐 방지) — config.yaml 주석 참고
    rearm_still_frames: 5
    switch_margin_y_shoulder: 0.2   # 한 팔만 인식 — 활성 팔 교체 여유 (config.yaml 주석 참고)
    double_within_sec: 1.2      # 수직 쓸기 1회/2연속 판정 창 — config.yaml 주석 참고
    body_scale:
      fallback_ratio: 0.22
      min_ratio: 0.08
      alpha: 0.1
announce:
  enabled: true
  backend: tts            # 맥 nsss — pyttsx3 미설치 시 자동 log 폴백
  rate_wpm: 200
  volume: 1.0
  event_templates:
    move_left: "왼쪽으로 이동"
    move_right: "오른쪽으로 이동"
    select: "선택했습니다"
    go_back: "이전 화면으로 이동합니다"
    go_home: "처음 화면으로 돌아갑니다"
    # read_focus(위로 1회 — 확인)는 템플릿 없음: 포커스 문구를 아는 UI가
    # POST /announce로 다시 읽어 준다 (연동 계약)

classes:
  [move_left, move_right, read_focus, select, go_back, go_home]

event_output:
  mode: console
  udp:
    host: 127.0.0.1
    port: 9999

demo_ui:
  host: 0.0.0.0
  port: 5001              # ★ 맥: 5000은 AirPlay 수신기가 선점 → 5001 사용
  stream_fps: 15
  jpeg_quality: 75

logging:
  level: INFO
  save_dir: logs/

runtime:
  python_version: "3.11.5"   # 배포 기준 — 맥 개발 venv(3.10)는 검증용이라 무관
  target_os: windows
  target_gpu: nvidia
