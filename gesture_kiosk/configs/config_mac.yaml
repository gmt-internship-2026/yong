# gesture_kiosk 맥(개발 PC) 전용 설정 — config.yaml과 같은 구조, 맥 환경 차이만 다르다
# 사용: python scripts/run_demo.py --config configs/config_mac.yaml
# 원본과 다른 점 (docs/MAC_RUN_LOG.md 참고):
#   demo_ui.port: 5000 → 5001   (맥 AirPlay 수신기(ControlCenter)가 5000 선점)
#   ocr.gpu: true → false       (맥은 CUDA 없음 — EasyOCR CPU 동작)
#   announce.backend: tts       (pyttsx3가 맥 nsss로 동작 — 미설치면 자동 log 폴백)

camera:
  device_id: 0            # 맥 내장(MacBook Pro) 카메라
  width_px: 1280
  height_px: 720
  mirror: true
  windows_backend: auto   # 맥에서는 무시된다
  fourcc: mjpg            # 캡처 픽셀 포맷 — 맥 내장 카메라는 무시될 수 있다 (무해)

model:
  # 라이선스 C안 — 제스처: MediaPipe(Apache-2.0) + 포즈: rtmlib(Apache-2.0). 맥은 CPU 실행(개발 확인용)
  gesture_engine: mediapipe
  mediapipe:
    hand_landmarker_path: models/weights/hand_landmarker.task
    num_hands: 2
    min_tracking_confidence: 0.5
    finger_extended_ratio: 1.15
    ok_pinch_ratio: 0.35
    bbox_pad_ratio: 0.15
    flip_handedness: true   # config.yaml 주석 참고 (mediapipe 라벨 방향 실측 보정)
  device: auto            # 맥: CUDA 없음 -> 자동으로 cpu
  use_tensorrt: false
  gesture_onnx_path: models/weights/YOLOv10n_gestures.onnx   # (onnx 엔진 전용 — 납품 금지)
  pose_mode: lightweight  # ★ 맥 CPU — 가벼운 포즈 모델로 개발 확인
  input_size_px: 640
  max_infer_fps: 60
  class_map:
    fist: fist
    palm: open_hand
    stop: open_hand
    stop_inverted: open_hand
    four: open_hand
    ok: ok
    point: point
    one: point
    like: thumbs_up

person_lock:
  enabled: true
  kpt_conf_threshold: 0.3
  lock_frame_count: 3
  follow_radius_ratio: 0.25
  release_sec: 2.0
  wrist_match_ratio: 0.14
  sharpness_weight: 0.5

detect:
  conf_threshold: 0.5
  cooldown_sec: 1.0

gestures:
  move: { fist_min_frames: 3, open_within_sec: 0.8 }
  select: { stable_frame_count: 5, max_static_move_ratio: 0.08 }
  two_palm: { action: go_home, hold_sec: 10.0, grace_sec: 0.4 }
  legacy:
    enabled: false          # config.yaml 주석 참고 (쉬는 손바닥의 palm_stop 간섭)
    stable_frame_count: 5
    max_static_move_ratio: 0.08
    swipe: { source_gesture: open_hand, window_sec: 0.7, min_dist_ratio: 0.35 }

ocr:
  enabled: true
  engine: easyocr
  languages: [ko, en]
  gpu: false              # ★ 맥: CUDA 없음 — CPU (개발 확인용, 느리다)
  interval_frames: 15
  timeout_sec: 30.0
  min_text_conf: 0.4
  guide_region_ratio: [0.15, 0.15, 0.85, 0.85]

announce:
  enabled: true
  backend: tts            # 맥 nsss — pyttsx3 미설치 시 자동 log 폴백
  rate_wpm: 200
  volume: 1.0
  event_templates:
    move_left: "왼쪽으로 이동"
    move_right: "오른쪽으로 이동"
    select: "선택했습니다"
    go_home: "처음 화면으로 돌아갑니다"
    help_call: "직원을 호출했습니다. 잠시만 기다려 주세요"
    fill_id_fields: "주민등록증 인식 완료. 이름과 주민등록번호가 입력되었습니다"

classes:
  [move_left, move_right, select, go_home, help_call, fill_id_fields,
   point, palm_stop, swipe_left, swipe_right, thumbs_up]

event_output:
  mode: console
  udp:
    host: 127.0.0.1
    port: 9999

demo_ui:
  host: 0.0.0.0
  port: 5001              # ★ 맥: 5000은 AirPlay 수신기가 선점 → 5001 사용
  stream_fps: 15
  jpeg_quality: 75

logging:
  level: INFO
  save_dir: logs/

runtime:
  python_version: "3.11.5"   # 배포 기준 — 맥 개발 venv(3.10)는 검증용이라 무관
  target_os: windows
  target_gpu: nvidia
