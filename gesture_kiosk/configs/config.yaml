# gesture_kiosk 설정 — 모든 튜닝값의 단일 출처 (기획서 4.7 : 코드에 숫자 하드코딩 금지)
#
# 2026-07-10 전면 개편 — 타깃: 윈도우 + NVIDIA GPU + Python 3.11.5 (정부 민원발급기)
# 2026-07-18 헤드트래커 전환 (팔 쓸기 전면 폐기, head_tracker_manual.md 기반):
#   코끝=포인터 이동 · 입 벌리기/1.5초 응시=선택(둘 다 활성) · 입 오므리기=뒤로·처음으로(겸용).
#   판정 엔진이 RTMPose(포즈)에서 MediaPipe FaceLandmarker(얼굴+블렌드셰이프)로 교체됐다.
#   CPU만으로 추론 ~30 FPS 실측(2026-07-20, proc 640x360 + 우선순위 상향 후 — KPI 달성).
#   GPU 의존 전부 제거(model.device·use_tensorrt·torch CUDA DLL 등록 삭제).
#   이전 RTMPose는 CPU 0.5 FPS로 GPU가 필수였다.
#   2026-07-18 2~3차: 뒤로가기를 눈썹 올리기 → 입 오므리기 → 양 눈 감기로 교체 —
#   눈썹은 앞머리에 가려질 수 있고, 입 오므리기는 select(입 벌리기)와 같은 입
#   근육이라 동작 전환 중 신호가 겹쳐(사용자 지적) 완전히 다른 부위(눈)로 정착.
# 2026-07-20 정확도 개선: 입벌림·눈감김을 고정 임계값 대신 "잠금 직후 캡처한 평상시
#   기준선 + 여유값"으로 판정 — 사람마다 평상시 블렌드셰이프 값 편차가 커서(실기
#   관찰: eyeBlink 0.1~0.6) 고정 임계 하나로는 오탐/미탐이 갈렸다. 코드 상세는
#   src/postprocess/head_tracker.py 모듈 docstring 참고.

camera:
  device_id: 0            # USB 웹캠 장치 번호
  width_px: 1280          # 캡처 요청 해상도 — 720p는 이 카메라의 30 FPS 지원 해상도.
  height_px: 720          #   4:3(예: 960x540 요청→640x480 협상)로 잡혀도 아래 proc_*가
                          #   중앙 크롭으로 16:9를 보장한다
  proc_width_px: 640      # 파이프라인 처리 해상도(2026-07-20) — 캡처 프레임을 진입 즉시
  proc_height_px: 360     #   이 크기(16:9)로 낮춘다. 720p를 그대로 흘리면 프레임 배관
                          #   (복사·시각화·JPEG) 비용 탓에 추론 FPS가 27→10으로 무너진다(실측).
                          #   16:9 고정은 데모 UI 스테이지(cover)와의 커서 정렬 조건 —
                          #   4:3이 섞이면 가장자리에서 호버가 최대 12.5% 어긋난다
  mirror: true            # 거울 모드 — 사용자 기준 좌/우와 고개 방향을 일치시킨다
  windows_backend: msmf   # 윈도우 캡처 백엔드: msmf | dshow | auto
                          #   Brio 100 실측(2026-07-10): dshow는 YUY2 720p로만 협상돼 ~5 FPS,
                          #   msmf는 30 FPS. 오픈이 수십 초 걸리는 장치면 dshow로 되돌릴 것
  fourcc: mjpg            # 캡처 픽셀 포맷 — 무압축(YUY2) 720p는 USB 한계로 ~5 FPS. auto면 미설정
                          #   (msmf는 이 설정을 무시하기도 한다 — dshow 계열 카메라용)

model:
  # 라이선스(2026-07-18): MediaPipe(Apache-2.0) FaceLandmarker **얼굴 단일 모델** —
  # 커서·선택·뒤로가기가 전부 이 랜드마크+블렌드셰이프로 판정된다.
  face_landmarker_path: models/weights/face_landmarker.task  # 빌드 타임 1회 다운로드
                          #   (scripts/download_weights.py) — 런타임 네트워크 접근 없음, 내부망 호환
  num_faces: 3            # 1로 두면 MediaPipe 자체 랭킹이 "누굴 볼지"를 가로채
                          #   person_lock의 크기×선명도 잠금이 무력화된다 — 후보를 넉넉히 받는다
  min_face_detection_conf: 0.5   # 실기 튜닝 필요
  min_face_presence_conf: 0.5    # 실기 튜닝 필요
  min_tracking_conf: 0.5         # 실기 튜닝 필요
  infer_scale_ratio: 1.0  # 추론 입력 추가 축소 배율 — 파이프라인이 이미 proc_*(640x360)로
                          #   작아서 기본 1.0(축소 없음). 더 약한 CPU에서 FPS가 모자라면
                          #   0.5~0.75로 낮춰볼 것(키오스크 거리에선 얼굴이 커서 여유 있음).
                          #   좌표는 정규화 값이라 원본 기준 자동 환산(face_estimator 참고)
  max_infer_fps: 30       # 추론 루프 FPS 상한 — 초과분은 대기 (CPU 낭비 방지)
                          #   KPI가 30 FPS — 60으로 두면 추론 루프가 캡처 스레드의
                          #   CPU/GIL을 빼앗아 캡처가 30→15 FPS로 반토막난다 (2026-07-10 실측)

person_lock:              # 오토포커스 카메라 — 초점 맞은 사용자에게 잠금, 다른 사람 무시
  enabled: true
  lock_frame_count: 3         # 최고 점수 후보가 N프레임 연속이면 그 사용자에게 잠금
  follow_radius_ratio: 0.25   # 잠금 유지·추적 반경 (프레임 폭 대비 비율)
  release_sec: 2.0            # 이 시간 동안 안 보이면 잠금 해제 — 다음 사용자 인식
  sharpness_weight: 0.5       # 사용자 선정 점수에서 초점 선명도 비중 (0=크기만, 1=선명도만)

head_tracker:              # 2026-07-18 신설 — 얼굴 신호를 커서·클릭·뒤로가기로 변환
  calibration_window_sec: 0.5   # 잠금 직후 코 위치·입벌림·눈감김 "평상시" 기준선을 동시에
                                 # 잡는 구간 (2026-07-20: 셋 다 같은 원리라 캘리브레이션 구간도 공유 —
                                 # src/postprocess/head_tracker.py의 _MedianCalibrator 참고).
                                 # 2026-07-18 실기: 0.3은 과도기 프레임 하나가 섞이면 커서가
                                 # 상단에 눌러붙는 현상 있어 0.5로 확대 + 평균 대신 중앙값 채택
  pointer:
    sensitivity_x: 0.8       # 2026-07-18 실기: 3.0은 미세한 고개 움직임에도 커서가 화면 끝까지
                              #   즉시 saturate됨 — 대폭 완화
    sensitivity_y: 0.5       # x보다 낮게 — 고개 상하 회전 범위가 좌우보다 좁아 같은 민감도면
                              #   상하가 더 쉽게 끝까지 튄다 (2026-07-18 실기: 상단 고착 현상 관측)
    smoothing_alpha: 0.3    # 실기 튜닝 필요 — 커서 위치 EMA (낮을수록 부드럽지만 지연 커짐)
    distance_smoothing_alpha: 0.2  # 실기 튜닝 필요 — 안구간거리 EMA (커서 스케일 튐 방지,
                                    #   커서 자체 EMA와 분리 — 하나로 묶으면 눈 코너 검출
                                    #   잡음이 커서 스케일 튐으로 보인다)
    max_offset_ratio: 0.5   # 중앙에서 화면 끝까지의 최대 오프셋 — 이 이상은 클램프
  click:
    min_interval_sec: 0.5   # 실기 튜닝 필요 — 입벌리기·응시 공용 쿨다운(동시 충족 시 1건만)
  mouth_click:               # 입 벌리기 — 즉시 클릭
    enabled: true
    # 2026-07-20: 고정 임계 대신 "잠금 직후 평상시 jawOpen(기준선) + 여유값" 판정으로 변경 —
    #   위 모듈 상단 주석 참고. 여유값 자체는 실기 튜닝 필요
    open_margin: 0.35        # 기준선 대비 이만큼 더 벌어지면 확정
    close_margin: 0.15       # 재장전 임계(히스테리시스) — open_margin보다 낮게
  eye_close_cancel:          # 양 눈 감고 버티기 — 뒤로가기(처음으로도 겸용)
                             # 2026-07-18 2차: 매뉴얼 원안(눈썹 올리기) → 입 오므리기 →
                             #   3차: 입 오므리기가 select(입 벌리기)와 같은 입 근육이라
                             #   전환 중 신호가 겹쳐 오작동 — 입과 완전히 다른 부위로 교체
    # 2026-07-20: 고정 임계(0.6) 대신 "잠금 직후 평상시 eyeBlink(기준선) + 여유값" 판정으로
    #   변경 — 실기 관찰상 평상시 eyeBlink가 사람마다 0.1~0.6까지 편차가 커 고정값 하나로는
    #   오탐(평상시에도 넘음)·미탐(감아도 못 넘음)이 갈렸다. 여유값 자체는 실기 튜닝 필요
    close_margin: 0.3        # 기준선 대비 이만큼 더 오르면 "감음"으로 판정 (둘 다 넘어야 인정 —
                              #   한쪽 윙크 오발화 방지, 윙크 못 하는 사용자도 조작 가능)
    hold_sec: 0.6            # 이보다 짧은 자연스러운 깜빡임(보통 0.4초 이하)은 걸러진다.
                             #   재발화는 눈을 뜨고(재장전) 다시 hold_sec 전체를 채워야 해서
                             #   별도 쿨다운 불필요
  recenter_gesture:          # 입 오므리기 — 자리 이동 없이 커서 중심을 다시 잡는다
                             # (2026-07-21 신설 — 재잠금 없이는 재캘리브레이션 방법이
                             #   없던 접근성 문제 보완).
                             # 2026-07-21 같은 날 2차례 교체: 원안 볼 부풀리기(cheekPuff)
                             #   → 코 찡그리기(noseSneer) 둘 다 실기 미인식(사용자 실측) —
                             #   입 오므리기(mouthPucker)로 최종 교체. 이 신호는 go_back
                             #   후보였다가 select(jawOpen)와 전환 중 겹쳐 폐기된 이력이
                             #   있는데, 그 폐기 이력 자체가 MediaPipe가 이 신호는 강하게
                             #   잡는다는 실증이라 재사용 — recenter는 드물고 독립적인
                             #   동작이라 그 전환-겹침 위험이 select만큼 크지 않다.
                             #   head_tracker.py 모듈 docstring 참고
    enabled: true
    open_margin: 0.5         # 실기 튜닝 필요 — 기준선 대비 이만큼 더 오므리면 확정
    close_margin: 0.3        # 재장전 임계(히스테리시스) — open_margin보다 낮게
    cooldown_sec: 1.0        # 연속 재정렬 방지 — 재정렬 자체가 잠깐 커서를 숨기므로
                             #   너무 잦으면 오히려 조작감을 해친다
  dwell_click:                # 1.5초 응시 — 마스크 등으로 입/눈 인식이 어려운 사용자용 대체 클릭
    enabled: true
    radius_ratio: 0.04      # 실기 튜닝 필요 — 이 반경(화면 비율) 안에 머물면 응시로 간주
    dwell_sec: 1.5           # 매뉴얼 명시값
    require_release_to_rearm: true  # 클릭 확정 후 반경을 벗어나야 재장전 — 연속 재발화 방지
  scroll:
    enabled: false          # v1 범위 밖 — 데모 UI가 고정 그리드라 스크롤이 없다 (TODO 참고)

announce:                   # 토크백(보이스오버) — 현재 위치·기능 음성 안내
  enabled: true
  backend: tts              # tts(pyttsx3 — 윈도우 SAPI/맥 nsss) | log(개발용: 로그로만 출력)
  rate_wpm: 200             # 말하기 속도
  volume: 1.0
  event_templates:          # 제스처 이벤트 자동 안내 문구
    select: "선택했습니다"
    go_back: "처음 화면으로 돌아갑니다"
    recenter: "커서를 다시 맞췄습니다"
  # UI 화면 안내(현재 커서가 올라간 항목 설명)는 UI가 POST /announce {"text": "..."}로 요청한다
  # (회사 프로그램 연동 계약 — 이벤트는 엔진→UI, 음성 안내 요청은 UI→엔진)

classes:                    # 표준 동작 목록 — UI/이벤트 수신부와의 계약
                            # (2026-07-18 헤드트래커 전환 — move_left/right·go_home 폐기)
                            # (2026-07-21 recenter 추가 — 커서 재정렬)
  [select, go_back, recenter]

event_output:
  # TODO(기획서 9장 №7): 회사 키오스크 프로그램의 이벤트 수신 규격(소켓/시리얼/공유메모리)
  #                      확정 후 mode 추가 및 event_sender.py 구현 교체
  mode: console           # console | udp
  udp:
    host: 127.0.0.1
    port: 9999

demo_ui:                  # 예시 UI 서버 — 회사 프로그램 인수 후 제거 예정
  host: 0.0.0.0
  port: 5000
  stream_fps: 15
  jpeg_quality: 75

logging:
  level: INFO
  save_dir: logs/

runtime:                  # 배포 기준 명세 — 설치가이드.md와 일치해야 한다
  python_version: "3.11.5"
  target_os: windows
  target_gpu: none         # 2026-07-18 — MediaPipe CPU 추론으로 GPU 불필요 확인(23 FPS 실측)
