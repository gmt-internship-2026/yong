# gesture_kiosk 설정 — 모든 튜닝값의 단일 출처 (기획서 4.7 : 코드에 숫자 하드코딩 금지)
#
# 2026-07-10 전면 개편 — 타깃: 윈도우 + NVIDIA GPU + Python 3.11.5 (정부 민원발급기)
# 2026-07-16 동작 체계 (토크백/보이스오버 문법 정렬 — 포즈 단일 엔진):
#   좌/우 쓸기=포커스 이동 · 위/아래 1회=확인(read_focus)/선택 ·
#   위/아래 2연속=처음으로/이전(파괴적 동작 안전장치 — 사용자 결정).
#   모든 판정이 RTMPose 키포인트 하나로 끝난다 (손 검출·꾸벅 등 구 방식 전부 제거).

camera:
  device_id: 0            # USB 웹캠 장치 번호
  width_px: 1280
  height_px: 720
  mirror: true            # 거울 모드 — 사용자 기준 좌/우와 쓸기 방향을 일치시킨다
  windows_backend: msmf   # 윈도우 캡처 백엔드: msmf | dshow | auto
                          #   Brio 100 실측(2026-07-10): dshow는 YUY2 720p로만 협상돼 ~5 FPS,
                          #   msmf는 30 FPS. 오픈이 수십 초 걸리는 장치면 dshow로 되돌릴 것
  fourcc: mjpg            # 캡처 픽셀 포맷 — 무압축(YUY2) 720p는 USB 한계로 ~5 FPS. auto면 미설정
                          #   (msmf는 이 설정을 무시하기도 한다 — dshow 계열 카메라용)

model:
  # 라이선스(2026-07-15 2차): rtmlib RTMPose(Apache-2.0) **포즈 단일 모델** —
  # 쓸기·사용자 잠금이 전부 이 키포인트로 판정된다 (구 방식 전부 제거)
  device: auto            # auto(CUDA 있으면 사용) | cuda | cpu — 포즈 ORT 세션에 적용
  use_tensorrt: false     # true면 TensorRT 가속 — 첫 실행 때 이 PC 전용 엔진 캐시 생성
  pose_mode: balanced     # rtmlib 포즈 크기: lightweight(빠름) | balanced | performance(정확)
  input_size_px: 640
  max_infer_fps: 30       # 추론 루프 FPS 상한 — 초과분은 대기 (GPU 낭비 방지)
                          #   KPI가 30 FPS — 60으로 두면 추론 루프가 캡처 스레드의
                          #   CPU/GIL을 빼앗아 캡처가 30→15 FPS로 반토막난다 (2026-07-10 실측)

person_lock:              # 오토포커스 카메라 — 초점 맞은 사용자에게 잠금, 다른 사람 무시
  enabled: true
  kpt_conf_threshold: 0.3     # 포즈 키포인트(손목·어깨·머리) 최소 신뢰도
  lock_frame_count: 3         # 최고 점수 후보가 N프레임 연속이면 그 사용자에게 잠금
  follow_radius_ratio: 0.25   # 잠금 유지·추적 반경 (프레임 폭 대비 비율)
  release_sec: 2.0            # 이 시간 동안 안 보이면 잠금 해제 — 다음 사용자 인식
  sharpness_weight: 0.5       # 사용자 선정 점수에서 초점 선명도 비중 (0=크기만, 1=선명도만)

gestures:
  cooldown_sec: 1.0           # 이벤트 확정 직후 입력 무시 시간 — 연타 방지.
                              #   swipe.window_sec보다 길게 유지할 것 —
                              #   쿨다운이 지나면 쓸기 궤적의 잔여 점이 전부 만료되게
  swipe:                      # 팔 쓸기 — 포즈 궤적 판정: 손이 없는 사용자도 동일 (범용 설계)
    # 거리 임계 단위 = **어깨너비 배수** (2026-07-16 정규화) — 카메라 거리·설치 위치가
    # 달라져도 "자기 어깨너비의 몇 배를 움직였나"로 판정돼 같은 동작이 같은 결과를 낸다
    window_sec: 0.8           # 이 시간 안의 이동량으로 판정 — 느긋한 쓸기 허용
                              #   (2026-07-16 0.6→0.8, cooldown_sec보다 짧게 유지)
    min_dist_x_shoulder: 0.8  # 좌/우 쓸기 확정 최소 이동 (어깨너비 배수 ≈ 32cm)
                              #   2026-07-16 실기: 1.1은 근거리에서 프레임 이탈 유발 → 0.8 완화
    min_dist_y_shoulder: 0.5  # 위/아래 쓸기 확정 최소 이동 (어깨너비 배수 ≈ 20cm)
    axis_dominance: 1.5       # 주축 진행도가 부축의 N배 이상일 때만 확정 — 대각선 오인 보류
    min_track_frames: 4       # 최소 궤적 프레임 — 키포인트 튐 1~2프레임 오발 방지
    elbow_gain: 2.0           # 팔꿈치 폴백(손목 신뢰도 미달 — 손 절단 등) 진행도 배율.
                              #   팔꿈치는 어깨 기준 회전 반경이 손목의 절반쯤이라 같은
                              #   팔 휘두름에도 이동량이 절반 — 같은 기준으로 판정되게 보정
    switch_margin_y_shoulder: 0.2 # 한 팔만 인식: 양팔이 다 보이면 더 높이 든 팔이 활성 —
                                  #   높이 차가 어깨너비의 20% 미만이면 현재 팔 유지 (교체 진동 방지)
    double_within_sec: 1.2    # 수직 쓸기 2연속 판정 창(2026-07-16 토크백 정렬) — 이 안에 같은
                              #   방향이 또 오면 홈/이전, 지나면 1회 동작(위=확인·아래=선택) 발화.
                              #   선택·확인 반응이 이만큼 늦는 트레이드오프 — 실기 튜닝 대상
    return_suppress_sec: 2.5  # 반대 방향 1회 삼킴(2026-07-16, 구 정지 재장전 대체) — 동작 후
                              #   이 시간 안의 반대 방향 쓸기 1건은 팔 되돌리기(복귀)로 보고 무시.
                              #   쿨다운(1초)보다 길어야 느린 복귀까지 잡는다
    stroke_gap_sec: 0.5       # 획 분리 유예 — 수직 보류 등록 직후 이 시간은 확정 무시:
                              #   같은 스윕의 꼬리 궤적이 1회를 2연속으로 오인하는 것 방지
    body_scale:               # 어깨너비 자(尺)의 안정화 — person_lock.user_shoulder_width_ratio
      fallback_ratio: 0.22    # 어깨 미검출 시 가정값(어깨너비/프레임폭) — 키오스크 표준 거리 기준.
                              #   이 값일 때 위 임계들이 종전 화면 비율 임계와 정확히 등가
      min_ratio: 0.08         # 하한 클램프 — 측면으로 돌아 어깨가 좁아져도 임계 과민 방지
      max_ratio: 0.32         # 상한 클램프(2026-07-16) — 카메라 근접 시 요구 이동량이
                              #   화면폭 ~26%를 넘지 않게: 팔이 프레임을 나가기 전에 확정된다
      alpha: 0.1              # EMA 평활 계수 — 프레임 단위 출렁임 흡수
announce:                   # 토크백(보이스오버) — 현재 위치·기능 음성 안내
  enabled: true
  backend: tts              # tts(pyttsx3 — 윈도우 SAPI/맥 nsss) | log(개발용: 로그로만 출력)
  rate_wpm: 200             # 말하기 속도
  volume: 1.0
  event_templates:          # 제스처 이벤트 자동 안내 문구
    move_left: "왼쪽으로 이동"
    move_right: "오른쪽으로 이동"
    select: "선택했습니다"
    go_back: "이전 화면으로 이동합니다"
    go_home: "처음 화면으로 돌아갑니다"
    # read_focus(위로 1회 — 확인)는 템플릿 없음: 포커스 문구를 아는 UI가
    # POST /announce로 다시 읽어 준다 (연동 계약)
  # UI 화면 안내(현재 포커스 항목 설명)는 UI가 POST /announce {"text": "..."}로 요청한다
  # (회사 프로그램 연동 계약 — 이벤트는 엔진→UI, 음성 안내 요청은 UI→엔진)

classes:                    # 표준 동작 목록 — UI/이벤트 수신부와의 계약
                            # (07-15 go_back 신설 · 07-16 OCR 제거·read_focus 신설 — 토크백 정렬)
  [move_left, move_right, read_focus, select, go_back, go_home]

event_output:
  # TODO(기획서 9장 №7): 회사 키오스크 프로그램의 이벤트 수신 규격(소켓/시리얼/공유메모리)
  #                      확정 후 mode 추가 및 event_sender.py 구현 교체
  mode: console           # console | udp
  udp:
    host: 127.0.0.1
    port: 9999

demo_ui:                  # 예시 UI 서버 — 회사 프로그램 인수 후 제거 예정
  host: 0.0.0.0
  port: 5000
  stream_fps: 15
  jpeg_quality: 75

logging:
  level: INFO
  save_dir: logs/

runtime:                  # 배포 기준 명세 — 설치가이드.md와 일치해야 한다
  python_version: "3.11.5"
  target_os: windows
  target_gpu: nvidia
