# gesture_kiosk 설정 — 모든 튜닝값의 단일 출처 (기획서 4.7 : 코드에 숫자 하드코딩 금지)
#
# 2026-07-10 전면 개편 — 타깃: 윈도우 + NVIDIA GPU + Python 3.11.5 (정부 민원발급기)
# 동작 체계(신규 스펙): 주먹→펴기 이동(왼손=왼쪽·오른손=오른쪽) / OK=선택·확인 통일 /
#                       양 손바닥 10초=처음으로. 기존 5.1 초안 동작은 legacy 토글로 유지.

camera:
  device_id: 0            # USB 웹캠 장치 번호
  width_px: 1280
  height_px: 720
  mirror: true            # 거울 모드 — 사용자 기준 좌/우와 이동 방향을 일치시킨다
  windows_backend: dshow  # 윈도우 캡처 백엔드: dshow(권장, 빠른 오픈) | msmf | auto

model:
  # 2026-07-11 라이선스 B안 — 실행기: ONNX Runtime(MIT) / 포즈: rtmlib RTMPose(Apache-2.0)
  device: auto            # auto(CUDA 있으면 사용) | cuda | cpu
  use_tensorrt: false     # true면 TensorRT 가속 — 첫 실행 때 이 PC 전용 엔진 캐시 생성 (구 build_engine 대체)
  gesture_onnx_path: models/weights/YOLOv10n_gestures.onnx   # HaGRIDv2 제스처 (저장소에 포함)
  pose_mode: balanced     # rtmlib 포즈 크기: lightweight(빠름) | balanced | performance(정확)
  input_size_px: 640
  max_infer_fps: 60       # 추론 루프 FPS 상한 — 초과분은 대기 (GPU 낭비 방지)
  class_map:              # 모델 출력 class_name -> 표준 제스처. 미등록 클래스는 무시된다
    # --- 신규 스펙 ---
    fist: fist            # 주먹 — "쥐었다 펴기" 이동의 시작 상태
    palm: open_hand       # 손바닥(펴기) — 이동의 끝 상태 + 양손 '처음으로'
    stop: open_hand
    stop_inverted: open_hand
    four: open_hand
    ok: ok                # OK사인 — 선택/확인 통일
    # --- 레거시(기획서 5.1 초안) — gestures.legacy.enabled=true일 때만 판정 ---
    point: point
    one: point
    like: thumbs_up

person_lock:              # 오토포커스 카메라 — 초점 맞은 사용자에게 잠금, 다른 사람 손 무시
  enabled: true
  kpt_conf_threshold: 0.3     # 포즈 키포인트(손목·머리) 최소 신뢰도
  lock_frame_count: 3         # 최고 점수 후보가 N프레임 연속이면 그 사용자에게 잠금
  follow_radius_ratio: 0.25   # 잠금 유지·추적 반경 (프레임 폭 대비 비율)
  release_sec: 2.0            # 이 시간 동안 안 보이면 잠금 해제 — 다음 사용자 인식
  wrist_match_ratio: 0.14     # 제스처 박스를 손목에 귀속시키는 최대 거리 (프레임 폭 비율)
  sharpness_weight: 0.5       # 사용자 선정 점수에서 초점 선명도 비중 (0=크기만, 1=선명도만)

detect:
  conf_threshold: 0.5
  cooldown_sec: 1.0           # 이벤트 확정 직후 입력 무시 시간 — 연타 방지

gestures:
  move:                       # 주먹 쥐었다 펴기 = 포커스 1칸 이동 (왼손=move_left, 오른손=move_right)
    fist_min_frames: 3        # 주먹이 N프레임 연속이면 "장전"
    open_within_sec: 0.8      # 장전 후 이 시간 안에 손바닥이 펴지면 이동 확정
  select:                     # OK 사인 = 선택/확인 (겹치므로 하나로 통일)
    stable_frame_count: 5     # N프레임 연속 유지 시 확정
    max_static_move_ratio: 0.08   # 정적 포즈로 인정하는 최대 이동량 (프레임 폭 비율)
  two_palm:                   # 양 손바닥 유지 = 처음으로 (기존 직원호출과 충돌 → action으로 선택)
    action: go_home           # go_home(신규 스펙 기본) | help_call(레거시 직원 호출)
    hold_sec: 10.0            # 이 시간 이상 유지되면 확정
    grace_sec: 0.4            # 인식이 잠깐 끊겨도 유지로 보는 허용 시간
  legacy:                     # 기획서 5.1 초안 동작 — 회사 협의 전까지 병행 유지 (2026-07-10 결정)
    enabled: true
    stable_frame_count: 5     # 정적(point/palm_stop/thumbs_up) N프레임 연속 판정
    max_static_move_ratio: 0.08
    swipe:
      source_gesture: open_hand   # 손바닥 궤적으로 스와이프 판정 (한 손일 때만)
      window_sec: 0.7
      min_dist_ratio: 0.35

ocr:                        # 주민등록증 인식 — 이름·주민등록번호 자동 입력
  enabled: true
  engine: easyocr           # 현재 easyocr 단일 구현 (교체 지점)
  languages: [ko, en]
  gpu: true                 # 윈도우+NVIDIA에서 true, 미지원 환경은 자동 CPU 폴백
  interval_frames: 15       # OCR 모드 중 N프레임마다 1회 인식 시도 (매 프레임은 낭비)
  timeout_sec: 30.0         # OCR 모드 자동 종료 시간 — UI가 다시 요청하면 재시작
  min_text_conf: 0.4        # 인식 문자열 최소 신뢰도
  guide_region_ratio: [0.15, 0.15, 0.85, 0.85]  # 인식 대상 중앙 영역 (x1,y1,x2,y2 비율)
  # 개인정보 원칙(개인정보보호법 — 주민등록번호 처리 법적 근거는 회사 확인 필요, TODO №11):
  #  - 카메라 프레임·인식 결과를 디스크에 저장하지 않는다
  #  - 로그에는 반드시 마스킹된 값만 남긴다 (예: 홍*동 / 950101-1******)

announce:                   # 토크백(보이스오버) — 현재 위치·기능 음성 안내
  enabled: true
  backend: tts              # tts(pyttsx3 — 윈도우 SAPI/맥 nsss) | log(개발용: 로그로만 출력)
  rate_wpm: 200             # 말하기 속도
  volume: 1.0
  event_templates:          # 제스처 이벤트 자동 안내 문구 ({side}=왼/오른)
    move_left: "왼쪽으로 이동"
    move_right: "오른쪽으로 이동"
    select: "선택했습니다"
    go_home: "처음 화면으로 돌아갑니다"
    help_call: "직원을 호출했습니다. 잠시만 기다려 주세요"
    fill_id_fields: "주민등록증 인식 완료. 이름과 주민등록번호가 입력되었습니다"
  # UI 화면 안내(현재 포커스 항목 설명)는 UI가 POST /announce {"text": "..."}로 요청한다
  # (회사 프로그램 연동 계약 — 이벤트는 엔진→UI, 음성 안내 요청은 UI→엔진)

classes:                    # 표준 동작 목록 — UI/이벤트 수신부와의 계약
  [move_left, move_right, select, go_home, help_call, fill_id_fields,
   point, palm_stop, swipe_left, swipe_right, thumbs_up]   # 뒤 5개 = 레거시

event_output:
  # TODO(기획서 9장 №7): 회사 키오스크 프로그램의 이벤트 수신 규격(소켓/시리얼/공유메모리)
  #                      확정 후 mode 추가 및 event_sender.py 구현 교체
  mode: console           # console | udp
  udp:
    host: 127.0.0.1
    port: 9999

demo_ui:                  # 예시 UI 서버 — 회사 프로그램 인수 후 제거 예정
  host: 0.0.0.0
  port: 5000
  stream_fps: 15
  jpeg_quality: 75

logging:
  level: INFO
  save_dir: logs/

runtime:                  # 배포 기준 명세 — 설치가이드.md와 일치해야 한다
  python_version: "3.11.5"
  target_os: windows
  target_gpu: nvidia
