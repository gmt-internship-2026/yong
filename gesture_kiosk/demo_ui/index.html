<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제스처 민원발급기 — 예시 UI</title>
<style>
  :root {
    --bg: #10141c; --panel: #1a2230; --panel2: #202b3d; --line: #2e3d55;
    --text: #e8eef7; --dim: #8ea0bb; --accent: #35c46f; --warn: #f0a437; --danger: #e05555;
    --focus: #4da3ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
  .banner { background: var(--warn); color: #1a1a1a; text-align: center; font-weight: 700; padding: 6px; font-size: 13px; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 14px 22px; border-bottom: 1px solid var(--line); }
  header h1 { font-size: 18px; }
  header .stats { display: flex; gap: 14px; font-size: 13px; color: var(--dim); }
  header .stats b { color: var(--accent); }
  .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
  .badge.on { background: var(--accent); color: #10141c; }
  .badge.off { background: var(--panel2); color: var(--dim); }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 22px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 14px; }
  .panel h2 { font-size: 14px; color: var(--dim); margin-bottom: 10px; }
  #cam { width: 100%; border-radius: 8px; background: #000; min-height: 300px; }
  .guide { margin-top: 10px; font-size: 12px; color: var(--dim); line-height: 1.9; }
  .guide span { display: inline-block; background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; padding: 1px 8px; margin-right: 6px; }
  .screen-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .screen-head .title { font-size: 17px; font-weight: 700; }
  .screen-head .hint { color: var(--dim); font-size: 12px; }
  .menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .item { background: var(--panel2); border: 2px solid var(--line); border-radius: 10px; padding: 22px 10px; text-align: center; font-size: 14px; transition: 0.15s; }
  .item.hl { border-color: var(--focus); box-shadow: 0 0 12px rgba(77,163,255,0.35); }
  .idform { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
  .idform label { font-size: 13px; color: var(--dim); }
  .idform .field { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; font-size: 16px; letter-spacing: 1px; min-height: 44px; }
  .idform .field.filled { border-color: var(--accent); }
  .scan-note { font-size: 13px; color: var(--warn); line-height: 1.7; margin-bottom: 14px; }
  .btnrow { display: flex; gap: 10px; }
  .btn { flex: 1; background: var(--panel2); border: 2px solid var(--line); border-radius: 10px; padding: 16px; text-align: center; font-weight: 700; }
  .btn.hl { border-color: var(--focus); box-shadow: 0 0 12px rgba(77,163,255,0.35); }
  .done { text-align: center; padding: 40px 0; }
  .done .big { font-size: 22px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
  .done p { color: var(--dim); font-size: 13px; line-height: 1.8; }
  #evlog { list-style: none; font-size: 12px; color: var(--dim); max-height: 130px; overflow-y: auto; }
  #evlog li { padding: 3px 0; border-bottom: 1px solid var(--panel2); }
  #evlog b { color: var(--text); }
  #toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
           background: var(--accent); color: #10141c; font-weight: 700; padding: 10px 26px; border-radius: 30px; }
</style>
</head>
<body>
<div class="banner">⚠ 예시 UI — 회사 키오스크 프로그램으로 교체 예정 (연동 계약: /data 이벤트 · POST /announce)</div>
<header>
  <h1>배리어프리 민원발급기 <small style="color:var(--dim);font-size:12px;">제스처 인식 데모</small></h1>
  <div class="stats">
    <span id="b-lock" class="badge off">사용자 인식 대기</span>
    <span>추론 <b id="s-infer">-</b> FPS</span>
    <span>카메라 <b id="s-cap">-</b> FPS</span>
  </div>
</header>
<main>
  <section class="panel">
    <h2>실시간 인식 화면 (CAM)</h2>
    <img id="cam" src="/video_feed" alt="camera stream">
    <div class="guide">
      <span>👋 좌/우 쓸기</span>포커스 이동 &nbsp; <span>⬆ 1회</span>선택·확인 &nbsp; <span>⬇ 1회</span>이전 화면<br>
      <span>⬆⬆ 2연속</span>처음으로
    </div>
    <div class="guide" id="dbg" style="margin-top:6px;"></div>
    <div style="margin-top:12px;">
      <h2>이벤트 로그</h2>
      <ul id="evlog"></ul>
    </div>
  </section>
  <section class="panel" id="screen"></section>
</main>
<div id="toast"></div>

<script>
// ── 민원발급기 예시 화면 3단계: 증명서 선택 → 발급 확인 → 발급 완료 ──
// (2026-07-16 주민등록증 OCR 제거 — 본인확인 절차는 회사 프로그램 담당)
const CERTS = ["주민등록표 등본", "주민등록표 초본", "가족관계증명서",
               "건축물대장", "토지(임야)대장", "지방세 납세증명"];
const CONFIRM_BUTTONS = ["발급하기", "취소"];

let screen = "home";        // home | confirm | done
let focusIdx = 0;           // 현재 화면의 선형 포커스 위치 (줄 끝 랩은 인덱스 순회로 자동)
let chosenCert = null;
let lastEventTs = 0;

const $ = (id) => document.getElementById(id);


function focusLabels() {
  if (screen === "home") return CERTS;
  if (screen === "confirm") return CONFIRM_BUTTONS;
  return ["처음으로"];
}

async function announce(text) {  // 화면 맥락 안내는 UI가 요청한다 (연동 계약 시연)
  try {
    await fetch("/announce", { method: "POST", headers: { "Content-Type": "application/json" },
                               body: JSON.stringify({ text }) });
  } catch (err) { /* 엔진 재시작 중 실패는 무시 */ }
}

function setFocus(nextIdx, isAnnounce = true) {
  const labels = focusLabels();
  focusIdx = (nextIdx + labels.length) % labels.length;  // 끝에서 다음 줄 첫째칸(토크백식 랩)
  render();
  if (isAnnounce) announce(labels[focusIdx]);
}

function enterScreen(nextScreen) {
  screen = nextScreen;
  focusIdx = 0;
  if (screen === "confirm") {
    announce(`${chosenCert} 발급 확인. 발급하기 또는 취소를 선택하세요`);
  } else if (screen === "done") {
    announce(`${chosenCert} 발급이 완료되었습니다`);
  } else {
    announce("증명서 선택 화면. 발급할 증명서를 선택하세요");
  }
  render();
}

function applyEvent(e) {
  if (e.class_name === "go_home") { enterScreen("home"); return; }
  if (e.class_name === "go_back") {   // 이전 화면 — 아래로 쓸기 (home에서는 무시)
    if (screen !== "home") enterScreen("home");
    return;
  }
  if (e.class_name === "move_left")  setFocus(focusIdx - 1);
  if (e.class_name === "move_right") setFocus(focusIdx + 1);
  if (e.class_name === "select") {
    if (screen === "home") { chosenCert = CERTS[focusIdx]; enterScreen("confirm"); }
    else if (screen === "confirm") {
      if (CONFIRM_BUTTONS[focusIdx] === "발급하기") enterScreen("done");
      else enterScreen("home");
    }
    else enterScreen("home");
  }
}

function render() {
  const s = $("screen");
  if (screen === "home") {
    s.innerHTML = `
      <div class="screen-head"><div class="title">증명서 선택</div>
        <div class="hint">👋 좌/우 쓸기 이동 · ⬆ 위로 1회 선택</div></div>
      <div class="menu">${CERTS.map((c, i) =>
        `<div class="item ${i === focusIdx ? "hl" : ""}">${c}</div>`).join("")}</div>`;
  } else if (screen === "confirm") {
    s.innerHTML = `
      <div class="screen-head"><div class="title">발급 확인 — ${chosenCert}</div>
        <div class="hint">⬆ 위로 쓸기 1회로 선택</div></div>
      <div class="btnrow">${CONFIRM_BUTTONS.map((b, i) =>
        `<div class="btn ${i === focusIdx ? "hl" : ""}">${b}</div>`).join("")}</div>`;
  } else {
    s.innerHTML = `
      <div class="done"><div class="big">✅ ${chosenCert} 발급 완료</div>
        <p>출력물을 받아 가세요.<br>⬆⬆ 위로 2연속 쓸기로 처음 화면으로 돌아갑니다.</p></div>`;
  }
}

function showToast(msg) {
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 1800);
}

async function poll() {
  try {
    const d = await (await fetch("/data")).json();
    $("s-infer").textContent = d.stats.infer_fps;
    $("s-cap").textContent = d.stats.capture_fps;

    const lock = $("b-lock");
    lock.className = "badge " + (d.status.is_user_locked ? "on" : "off");
    lock.textContent = d.status.is_user_locked ? "사용자 고정됨" : "사용자 인식 대기";


    const g = d.debug || {};
    $("dbg").textContent = `계기판 — 스케일 ${g.body_scale ?? "-"} · 팔 ${g.active_side ?? "-"}${g.active_source === "elbow" ? "(팔꿈치)" : ""}${g.swallow ? ` · 복귀무시 예약(${g.swallow === "left" ? "좌" : g.swallow === "right" ? "우" : g.swallow === "up" ? "위" : "아래"})` : ""} · 쓸기 x ${g.swipe_progress_x ?? 0} / y ${g.swipe_progress_y ?? 0}${g.pending ? ` · ${g.pending === "up" ? "위" : "아래"} 1회 보류(한 번 더=홈/이전)` : ""}`;

    const log = $("evlog");
    log.innerHTML = d.events.slice().reverse().map(e =>
      `<li><b>${e.class_name}</b>${e.hand_side ? ` (${e.hand_side})` : ""} conf=${e.conf}</li>`).join("");
    for (const e of d.events) {
      if (e.ts_sec > lastEventTs) { lastEventTs = e.ts_sec; applyEvent(e); }
    }
  } catch (err) { /* 서버 재시작 중 폴링 실패는 무시 */ }
}
render();
setInterval(poll, 250);
</script>
</body>
</html>
